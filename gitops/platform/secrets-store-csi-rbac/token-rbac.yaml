# Extra RBAC for the Secrets Store CSI Driver to support EKS Pod Identity.
#
# With Pod Identity, the driver exchanges a workload's ServiceAccount token for
# AWS credentials, so it must be able to create serviceaccounts/token. The
# managed add-on's bundled driver RBAC does not grant this, so we add it here.
# The driver runs as the secrets-store-csi-driver ServiceAccount in kube-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-store-csi-driver-token-request
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-store-csi-driver-token-request
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-store-csi-driver-token-request
subjects:
  - kind: ServiceAccount
    name: secrets-store-csi-driver
    namespace: kube-system
