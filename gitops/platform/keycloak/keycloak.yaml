# Keycloak (official upstream image) backed by the Postgres above.
# Runs in production mode with HTTP enabled behind the in-cluster Service;
# TLS is expected to terminate at an ingress/load balancer in front of it.
#
# Secrets (admin password + DB password) come from AWS Secrets Manager via the
# Secrets Store CSI Driver: the pod mounts the CSI volume (SecretProviderClass
# keycloak-admin), which syncs the "keycloak-admin" Kubernetes Secret consumed
# below. The admin username and DB username are not secret, so they are plain
# env values.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak
      # Wait for Postgres to accept TCP connections before starting Keycloak,
      # so a fresh deploy doesn't crash-loop while the database comes up.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres.keycloak.svc:5432..."
              until nc -z postgres.keycloak.svc 5432; do sleep 3; done
              echo "Postgres is reachable."
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3.3
          # Plain `start` (not --optimized): Keycloak runs its build step at boot
          # using the build-time options below (KC_DB, KC_HEALTH_ENABLED), so no
          # separate `kc.sh build` / custom image is needed.
          args: ["start"]
          env:
            # Database wiring to the Postgres StatefulSet.
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres.keycloak.svc:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KC_DB_PASSWORD
            # Bootstrap admin. Username is not secret; password comes from the
            # CSI-synced Secret. (KC_BOOTSTRAP_* are the current var names.)
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
            # Run behind a proxy/ingress that terminates TLS; allow HTTP on the
            # backend and trust forwarded headers.
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            # Public URL Keycloak advertises (OIDC issuer, redirects). Served at
            # /keycloak behind the ALB. PREREQUISITE: the host must resolve to
            # the ALB. Placeholder default: platform.example.com.
            - name: KC_HOSTNAME
              value: https://patelax.people.aws.dev/keycloak
            # Serve Keycloak under the /keycloak path prefix (so it sits behind
            # the shared ALB alongside Backstage). Without this, Keycloak serves
            # at root and the /keycloak/* routes 404.
            - name: KC_HTTP_RELATIVE_PATH
              value: /keycloak
            # Build-time options baked so `start --optimized` works.
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            # Mounting the CSI volume is what triggers the secret sync.
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          # With KC_HTTP_RELATIVE_PATH=/keycloak, the management interface
          # (port 9000) also serves health under the prefix (verified on 26.3.3:
          # /keycloak/health/live = 200, /health/live = 404).
          readinessProbe:
            httpGet:
              path: /keycloak/health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /keycloak/health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: keycloak-admin
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# ALB Ingress for Keycloak, served at /keycloak. Uses the shared ALB ingress
# group "idp" so Keycloak and Backstage share one load balancer. HTTPS via ACM;
# HTTP is redirected to HTTPS.
#
# PREREQUISITE for public users: replace the certificate-arn with an ACM cert
# for your own domain (see config.domain). The ALB group annotations must match
# Backstage's so they share one load balancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: idp
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # No certificate-arn here: the controller auto-discovers the ACM cert that
    # matches the Ingress host rule below. (Keeps the account-specific ARN out
    # of git — just have an ACM cert covering your domain.)
    # Redirect all HTTP to HTTPS.
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Keycloak's /health is on the management port (9000), not the traffic port,
    # so health-check a path Keycloak serves 200 on port 8080.
    alb.ingress.kubernetes.io/healthcheck-path: /keycloak/realms/master
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    # PREREQUISITE: set this host to your platform domain (config.domain). The
    # controller selects the ACM cert that matches it for the HTTPS listener.
    - host: patelax.people.aws.dev
      http:
        paths:
          - path: /keycloak
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80

