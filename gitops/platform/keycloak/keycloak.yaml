# Keycloak (official upstream image) backed by the Postgres above.
# Runs in production mode with HTTP enabled behind the in-cluster Service;
# TLS is expected to terminate at an ingress/load balancer in front of it.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  # Bootstrap admin for the Keycloak master realm. Replace via Secrets Manager
  # / ExternalSecret for production.
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: keycloak-admin-pw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      # Wait for Postgres to accept TCP connections before starting Keycloak,
      # so a fresh deploy doesn't crash-loop while the database comes up.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres.keycloak.svc:5432..."
              until nc -z postgres.keycloak.svc 5432; do sleep 3; done
              echo "Postgres is reachable."
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3.3
          # Plain `start` (not --optimized): Keycloak runs its build step at boot
          # using the build-time options below (KC_DB, KC_HEALTH_ENABLED), so no
          # separate `kc.sh build` / custom image is needed.
          args: ["start"]
          env:
            # Database wiring to the Postgres StatefulSet.
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres.keycloak.svc:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres
                  key: POSTGRES_PASSWORD
            # Bootstrap admin (KC_BOOTSTRAP_* are the current var names; the
            # older KEYCLOAK_ADMIN* are deprecated).
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
            # Run behind a proxy/ingress that terminates TLS; allow HTTP on the
            # backend and trust forwarded headers.
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            # Build-time options baked so `start --optimized` works.
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 80
      targetPort: 8080
