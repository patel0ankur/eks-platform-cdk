# PostgreSQL backing store for Keycloak. A single replica with a persistent
# volume is sufficient for a platform IdP at this scale.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres
  namespace: keycloak
type: Opaque
stringData:
  # Demo credentials. For production, replace with an ExternalSecret sourced
  # from AWS Secrets Manager.
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: keycloak-postgres-pw
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: keycloak
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:17.4-alpine3.21
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: keycloak-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keycloak
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
