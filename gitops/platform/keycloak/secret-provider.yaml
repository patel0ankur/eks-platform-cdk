# Service accounts for the workloads (Pod Identity associations bind the
# Secrets-Manager reader role to these in CDK), plus SecretProviderClasses that
# mount the Secrets Manager values and sync them into Kubernetes Secrets.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
  namespace: keycloak
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: keycloak
---
# Postgres password from Secrets Manager -> mounted file + synced k8s Secret
# "keycloak-postgres" with key POSTGRES_PASSWORD.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keycloak-postgres
  namespace: keycloak
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "idp/keycloak/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: password
            objectAlias: postgres-password
  secretObjects:
    - secretName: keycloak-postgres
      type: Opaque
      data:
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
---
# Keycloak's own SPC. Keycloak needs BOTH the admin password and the DB
# password, so this syncs both (from Secrets Manager) into the "keycloak-admin"
# Kubernetes Secret. This keeps Keycloak independent of Postgres's pod lifecycle
# (the synced Secret exists as long as the Keycloak pod mounts this volume).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keycloak-admin
  namespace: keycloak
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "idp/keycloak/admin"
        objectType: "secretsmanager"
        jmesPath:
          - path: password
            objectAlias: admin-password
      - objectName: "idp/keycloak/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: password
            objectAlias: db-password
  secretObjects:
    - secretName: keycloak-admin
      type: Opaque
      data:
        - objectName: admin-password
          key: KEYCLOAK_ADMIN_PASSWORD
        - objectName: db-password
          key: KC_DB_PASSWORD
