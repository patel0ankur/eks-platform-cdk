# Keycloak post-start configuration: creates the Backstage realm + OIDC client
# via the Keycloak Admin API, then harvests the generated client secret into a
# Kubernetes Secret that Backstage consumes. The client secret is never stored
# in git — Keycloak generates it and the Job copies it into the cluster.
#
# Runs as a Job (Helm/Argo hook-like) after Keycloak is reachable. Idempotent:
# re-running updates the client and refreshes the secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-config
  namespace: keycloak
---
# ClusterRole (not a namespaced Role): the Job writes the harvested OIDC client
# secret into the `backstage` namespace and ensures that namespace exists, so it
# needs secret + namespace permissions beyond its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloak-config
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-config
subjects:
  - kind: ServiceAccount
    name: keycloak-config
    namespace: keycloak
roleRef:
  kind: ClusterRole
  name: keycloak-config
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config-script
  namespace: keycloak
data:
  # Realm + Backstage client definitions and the configuration script. ${DOMAIN}
  # is substituted from the env (sourced from the platform domain).
  backstage-client.json: |
    {
      "protocol": "openid-connect",
      "clientId": "backstage",
      "name": "Backstage Client",
      "description": "Used for Backstage SSO",
      "publicClient": false,
      "standardFlowEnabled": true,
      "directAccessGrantsEnabled": true,
      "frontchannelLogout": true,
      "rootUrl": "https://DOMAIN_PLACEHOLDER/backstage",
      "redirectUris": [
        "https://DOMAIN_PLACEHOLDER/backstage/api/auth/keycloak-oidc/handler/frame"
      ],
      "webOrigins": ["/*"]
    }
  configure.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    # Keycloak serves under /keycloak (KC_HTTP_RELATIVE_PATH), so all admin API
    # and realm paths are under that prefix.
    KC=http://keycloak.keycloak.svc/keycloak
    REALM=backstage

    echo "Waiting for Keycloak to be ready..."
    until curl -sf "$KC/health/ready" >/dev/null 2>&1 || curl -sf "$KC/realms/master" >/dev/null 2>&1; do
      sleep 5
    done

    # Admin token (master realm).
    get_admin_token() {
      curl -sf -X POST "$KC/realms/master/protocol/openid-connect/token" \
        -d "grant_type=password" -d "client_id=admin-cli" \
        -d "username=admin" -d "password=${KC_ADMIN_PASSWORD}" \
        | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p'
    }
    TOKEN=$(get_admin_token)
    auth=( -H "Authorization: Bearer $TOKEN" )

    # Create realm (ignore if it already exists).
    curl -s "${auth[@]}" -X POST "$KC/admin/realms" \
      -H "Content-Type: application/json" \
      -d "{\"realm\":\"$REALM\",\"enabled\":true}" >/dev/null || true

    # Substitute the domain into the client payload and create the client.
    sed "s/DOMAIN_PLACEHOLDER/${DOMAIN}/g" /config/backstage-client.json > /tmp/client.json
    curl -s "${auth[@]}" -X POST "$KC/admin/realms/$REALM/clients" \
      -H "Content-Type: application/json" -d @/tmp/client.json >/dev/null || true

    # Look up the client id and read its generated secret.
    CID=$(curl -sf "${auth[@]}" "$KC/admin/realms/$REALM/clients?clientId=backstage" \
      | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -1)
    SECRET=$(curl -sf "${auth[@]}" "$KC/admin/realms/$REALM/clients/$CID/client-secret" \
      | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')

    # Create a test user so there is something to log in with.
    curl -s "${auth[@]}" -X POST "$KC/admin/realms/$REALM/users" \
      -H "Content-Type: application/json" \
      -d "{\"username\":\"developer\",\"enabled\":true,\"email\":\"developer@example.com\",\"emailVerified\":true,\"firstName\":\"Dev\",\"lastName\":\"User\",\"credentials\":[{\"type\":\"password\",\"value\":\"${DEVELOPER_PASSWORD}\",\"temporary\":false}]}" >/dev/null || true

    # Write the client secret into a k8s Secret for Backstage to consume.
    # Backstage runs in its own namespace, so publish the secret there (a pod
    # can only read Secrets in its own namespace). Ensure the namespace exists
    # first so this works even if Backstage hasn't been deployed yet. Use a
    # get-or-create so we never patch an existing namespace (which would need
    # broader RBAC than this Job has).
    kubectl get namespace backstage >/dev/null 2>&1 || kubectl create namespace backstage
    kubectl create secret generic keycloak-clients -n backstage \
      --from-literal=BACKSTAGE_CLIENT_SECRET="$SECRET" \
      --dry-run=client -o yaml | kubectl apply -f -

    echo "Keycloak configured: realm=$REALM, backstage client + secret written."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config
  namespace: keycloak
  annotations:
    # Re-run on each sync so config converges after Keycloak (re)starts.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: keycloak-config
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: dtzar/helm-kubectl:3.16
          command: ["/bin/bash", "/config/configure.sh"]
          env:
            # PREREQUISITE: set this to your platform domain (must resolve to
            # the ALB). Placeholder default is platform.example.com.
            - name: DOMAIN
              value: patelax.people.aws.dev
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: DEVELOPER_PASSWORD
              value: "developer"
          volumeMounts:
            - name: script
              mountPath: /config
      volumes:
        - name: script
          configMap:
            name: keycloak-config-script
