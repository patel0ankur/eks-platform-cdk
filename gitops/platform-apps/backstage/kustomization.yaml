# Kustomize entrypoint for the Backstage app. ArgoCD renders this directory
# with Kustomize, which lets the ArgoCD Application (defined in CDK) override
# the container image at sync time: the placeholder name "backstage-image" is
# rewritten to the real ECR repository URI via a Kustomize `images:` patch.
# That keeps the account-specific ECR registry out of git.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - secret-provider.yaml
  - kubernetes-rbac.yaml
  - postgres.yaml
  - backstage.yaml
  - ingress.yaml
