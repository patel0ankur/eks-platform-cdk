# Service accounts for the Backstage workloads, plus the SecretProviderClass
# that pulls Backstage's database password from AWS Secrets Manager.
#
# A Pod Identity association (created in CDK, SecretsStack) binds the
# Secrets-Manager reader role to the `postgres` service account here, so the
# Secrets Store CSI Driver can fetch the password on that pod's behalf.
#
# Backstage itself needs no AWS credentials: it reads the DB password from the
# synced Kubernetes Secret, and the Keycloak client secret from the
# "keycloak-clients" Secret (published into this namespace by Keycloak's
# configuration Job).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: backstage
---
# Backstage Postgres password from Secrets Manager -> mounted file + synced
# k8s Secret "backstage-postgres" with key POSTGRES_PASSWORD.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backstage-postgres
  namespace: backstage
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "idp/backstage/postgres"
        objectType: "secretsmanager"
        jmesPath:
          - path: password
            objectAlias: postgres-password
  secretObjects:
    - secretName: backstage-postgres
      type: Opaque
      data:
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
