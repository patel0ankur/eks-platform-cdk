# ALB Ingress for Backstage, served at /backstage. Uses the SAME shared ALB
# ingress group "idp" as Keycloak, so both share one load balancer (one DNS
# name, one certificate). HTTPS via ACM; HTTP is redirected to HTTPS.
#
# PREREQUISITE for public users: set the host below to your platform domain
# (config.domain) and have an ACM certificate covering it in this region — the
# controller auto-discovers the cert that matches this host rule. The group
# annotations MUST match Keycloak's so they share one load balancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: idp
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # No certificate-arn: the controller auto-discovers the ACM cert matching
    # the host rule below (keeps the account-specific ARN out of git).
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Backstage serves its frontend under /backstage and returns 200 at that
    # path once it is up.
    alb.ingress.kubernetes.io/healthcheck-path: /backstage
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    # PREREQUISITE: set this host to your platform domain (config.domain).
    - host: patelax.people.aws.dev
      http:
        paths:
          - path: /backstage
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 80
