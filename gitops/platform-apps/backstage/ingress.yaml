# ALB Ingress for Backstage. Uses the SAME shared ALB ingress group "idp" as
# Keycloak, so both share one load balancer (one DNS name, one certificate).
# HTTPS via ACM; HTTP is redirected to HTTPS.
#
# Backstage is served at the ROOT ("/") of the shared host. Backstage does not
# support being hosted under a sub-path, so it owns the root while Keycloak
# sits under /keycloak (Keycloak supports a path prefix natively). The ALB
# routes by path: the more specific /keycloak rule wins for Keycloak, and
# everything else ("/") goes to Backstage.
#
# PREREQUISITE for public users: point your platform domain (config.domain) at
# the ALB and have an ACM certificate covering it. The group annotations MUST
# match Keycloak's so they share one load balancer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: idp
    # Backstage owns the catch-all "/", so it MUST be evaluated LAST on the
    # shared ALB — otherwise its "/" rule captures /keycloak/* before the more
    # specific Keycloak rule (group.order 10) is reached. Higher order = later.
    alb.ingress.kubernetes.io/group.order: "100"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # No certificate-arn: the controller auto-discovers the ACM cert matching
    # the host rule below (keeps the account-specific ARN out of git).
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Backstage returns 200 at the root once it is up.
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    # PREREQUISITE: set this host to your platform domain (config.domain).
    - host: patelax.people.aws.dev
      http:
        paths:
          # Backstage owns the root. Keycloak's Ingress (same ALB group) adds
          # the more specific /keycloak rule, which the ALB evaluates first.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 80
