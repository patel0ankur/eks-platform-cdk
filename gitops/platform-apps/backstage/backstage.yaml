# Backstage developer portal (our own Backstage app — built from source into the
# idp-backstage ECR image, NOT a third-party image).
#
# The manifest references the image by the placeholder name "backstage-image";
# the ArgoCD Application (defined in CDK, BackstageDeployStack) rewrites that to
# the real ECR URI via a Kustomize image override, keeping the account-specific
# ECR registry out of git.
#
# This config layer (app-config.extra.yaml, mounted at /config and passed last)
# overrides the image's baked defaults for the deployed environment:
#   - app/backend baseUrl -> the public root URL (the app is served at "/")
#   - auth -> guest for now (Keycloak OIDC is wired in a later step)
#   - catalog.providers.github -> disabled (the baked production config declares
#     a GitHub org provider that CRASHES the backend at boot if GITHUB_ORG is
#     unset; we clear it here until GitHub discovery is configured)
#
# Secrets come from Kubernetes Secrets (never from git):
#   - backstage-postgres : DB password, synced from Secrets Manager (CSI).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  # Layered last (after app-config.yaml + app-config.production.yaml), so these
  # values win. Backstage deep-merges configs; later files override earlier.
  app-config.extra.yaml: |
    app:
      # Backstage is served at the ROOT of the shared platform host. Backstage
      # does not support a sub-path, so it owns "/" while Keycloak sits under
      # /keycloak. With a root baseUrl the frontend's static assets are baked
      # to /static and the backend serves them and its /api there natively, so
      # no path rewriting is needed (the AWS Load Balancer Controller cannot
      # rewrite paths anyway).
      baseUrl: https://patelax.people.aws.dev
    backend:
      baseUrl: https://patelax.people.aws.dev
      # Browser origin allowed to call the backend (same host).
      cors:
        origin: https://patelax.people.aws.dev
    # NOTE: We use the DEFAULT popup sign-in flow. The experimental redirect flow
    # (enableExperimentalRedirectFlow) requires server-side OIDC session state that
    # was failing here ("req.session[oidc:...] is undefined"); the popup flow is
    # verified working end-to-end.
    auth:
      environment: production
      # Session secret for the OIDC cookie flow (any stable random string).
      session:
        secret: ${AUTH_SESSION_SECRET}
      providers:
        # Guest sign-in (the SignInPage offers it as a quick option). Needs the
        # flag because the provider refuses to issue tokens when environment !=
        # development. Guest maps to user:default/guest.
        guest:
          dangerouslyAllowOutsideDevelopment: true
        # Keycloak via the generic OIDC provider. Provider id MUST be "oidc"
        # (matches the backend strategy + the /api/auth/oidc/... callback).
        oidc:
          production:
            metadataUrl: https://patelax.people.aws.dev/keycloak/realms/backstage/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                # Maps the Keycloak user's email local-part (e.g. "developer"
                # from developer@example.com) to a catalog User of that name.
                # Add catalog Users (examples/org.yaml) for each sign-in user.
                - resolver: emailLocalPartMatchingUserEntityName
    devOpsAgent:
      # Live mode: the backend calls the real AWS DevOps Agent API using the
      # Backstage pod's IAM role (EKS Pod Identity, granted in
      # BackstageDeployStack). Components opt in via the aws-devops-agent/space-id
      # annotation.
      mock: false
      region: us-east-1
    kubernetes:
      # Backstage reads workloads from THIS cluster (it runs inside it). The
      # 'config' locator with authProvider 'serviceAccount' and NO
      # serviceAccountToken makes the plugin use the in-cluster client (the
      # mounted SA token); the url/caData below are ignored in that mode.
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - name: idp-cluster
              url: https://kubernetes.default.svc
              authProvider: 'serviceAccount'
              skipTLSVerify: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      # Mount the service-account token so the Kubernetes plugin can talk to the
      # cluster API via the in-cluster client (read-only access granted by
      # kubernetes-rbac.yaml). Used by the per-component "Kubernetes" tab.
      automountServiceAccountToken: true
      # Wait for Postgres to accept connections so a fresh deploy doesn't
      # crash-loop while the database comes up.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres.backstage.svc:5432..."
              until nc -z postgres.backstage.svc 5432; do sleep 3; done
              echo "Postgres is reachable."
      containers:
        - name: backstage
          image: backstage-image
          # Append our override config to the image's default config chain.
          command: ["node", "packages/backend"]
          args:
            - "--config"
            - "app-config.yaml"
            - "--config"
            - "app-config.production.yaml"
            - "--config"
            - "/config/app-config.extra.yaml"
          env:
            # Database (the baked production config reads these). Host is the
            # in-namespace Postgres Service; the password comes from the
            # CSI-synced Secret (from AWS Secrets Manager).
            - name: POSTGRES_HOST
              value: postgres.backstage.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-postgres
                  key: POSTGRES_PASSWORD
            # Keycloak OIDC client secret (harvested into this namespace by the
            # Keycloak config Job as the "keycloak-clients" secret).
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-clients
                  key: BACKSTAGE_CLIENT_SECRET
            # Backstage auth session secret for the OIDC cookie flow.
            - name: AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-auth
                  key: SESSION_SECRET
            - name: NODE_ENV
              value: production
          ports:
            - name: http
              containerPort: 7007
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true
          # The backend serves the app at "/" on 7007. A TCP probe avoids
          # depending on a specific health path while it warms up.
          readinessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: app-config
          configMap:
            name: backstage-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  selector:
    app: backstage
  ports:
    - name: http
      port: 80
      targetPort: 7007
