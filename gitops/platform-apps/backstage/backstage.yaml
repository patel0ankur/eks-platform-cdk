# Backstage developer portal (our own Backstage app — built from source into the
# idp-backstage ECR image, NOT a third-party image).
#
# The manifest references the image by the placeholder name "backstage-image";
# the ArgoCD Application (defined in Terraform, backstage-deploy.tf) rewrites
# that to the real ECR URI via a Kustomize image override, keeping the
# account-specific ECR registry out of git.
#
# This config layer (app-config.extra.yaml, mounted at /config and passed last)
# overrides the image's baked defaults for the deployed environment:
#   - app/backend baseUrl -> the public URL, injected at runtime as
#     ${APP_BASE_URL} (the ALB DNS name Terraform discovered — see
#     backstage-deploy.tf). Backstage substitutes ${VAR} from the environment.
#   - auth -> guest sign-in only (zero prerequisites; no external identity
#     provider needed to reach the portal). OIDC can be layered on later.
#   - catalog.providers.github -> disabled (the baked production config declares
#     a GitHub org provider that CRASHES the backend at boot if GITHUB_ORG is
#     unset; we clear it here until GitHub discovery is configured)
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  # Layered last (after app-config.yaml + app-config.production.yaml), so these
  # values win. Backstage deep-merges configs; later files override earlier.
  app-config.extra.yaml: |
    app:
      # The public URL Backstage is served at, injected at runtime from the
      # backstage-runtime Secret (the ALB DNS name discovered by Terraform).
      # Served at the ROOT "/"; the backend serves the frontend assets and its
      # /api there natively, so no path rewriting is needed.
      baseUrl: ${APP_BASE_URL}
    backend:
      baseUrl: ${APP_BASE_URL}
      # Browser origin allowed to call the backend (same host).
      cors:
        origin: ${APP_BASE_URL}
    auth:
      environment: production
      # Session secret for the sign-in cookie flow (a stable random string
      # generated by Terraform).
      session:
        secret: ${AUTH_SESSION_SECRET}
      providers:
        # Guest sign-in — anyone can enter the portal without an identity
        # provider. Needs the flag because the provider refuses to issue tokens
        # when environment != development. Guest maps to user:default/guest.
        guest:
          dangerouslyAllowOutsideDevelopment: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      # Backstage does not talk to the Kubernetes API (no in-cluster plugins), so
      # the service-account token is not mounted.
      automountServiceAccountToken: false
      # Wait for Postgres to accept connections so a fresh deploy doesn't
      # crash-loop while the database comes up.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres.backstage.svc:5432..."
              until nc -z postgres.backstage.svc 5432; do sleep 3; done
              echo "Postgres is reachable."
      containers:
        - name: backstage
          image: backstage-image
          # Append our override config to the image's default config chain.
          command: ["node", "packages/backend"]
          args:
            - "--config"
            - "app-config.yaml"
            - "--config"
            - "app-config.production.yaml"
            - "--config"
            - "/config/app-config.extra.yaml"
          env:
            # Public URL, database, and session secret all come from the
            # "backstage-runtime" Secret that Terraform creates
            # (backstage-deploy.tf): APP_BASE_URL is the discovered ALB URL,
            # POSTGRES_PASSWORD and SESSION_SECRET are generated.
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: backstage-runtime
                  key: APP_BASE_URL
            # Database (the baked production config reads these). Host is the
            # in-namespace Postgres Service.
            - name: POSTGRES_HOST
              value: postgres.backstage.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-runtime
                  key: POSTGRES_PASSWORD
            # Backstage auth session secret for the sign-in cookie flow.
            - name: AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-runtime
                  key: SESSION_SECRET
            - name: NODE_ENV
              value: production
          ports:
            - name: http
              containerPort: 7007
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true
          # The backend serves the app at "/" on 7007. A TCP probe avoids
          # depending on a specific health path while it warms up.
          readinessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: app-config
          configMap:
            name: backstage-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  selector:
    app: backstage
  ports:
    - name: http
      port: 80
      targetPort: 7007
