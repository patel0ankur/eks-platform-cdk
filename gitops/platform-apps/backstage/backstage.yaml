# Backstage developer portal (our own Backstage app — built from source into the
# idp-backstage ECR image, NOT a third-party image).
#
# The manifest references the image by the placeholder name "backstage-image";
# the ArgoCD Application (defined in CDK, BackstageDeployStack) rewrites that to
# the real ECR URI via a Kustomize image override, keeping the account-specific
# ECR registry out of git.
#
# This config layer (app-config.extra.yaml, mounted at /config and passed last)
# overrides the image's baked defaults for the deployed environment:
#   - app/backend baseUrl -> the public root URL (the app is served at "/")
#   - auth -> guest for now (Keycloak OIDC is wired in a later step)
#   - catalog.providers.github -> disabled (the baked production config declares
#     a GitHub org provider that CRASHES the backend at boot if GITHUB_ORG is
#     unset; we clear it here until GitHub discovery is configured)
#
# Secrets come from Kubernetes Secrets (never from git):
#   - backstage-postgres : DB password, synced from Secrets Manager (CSI).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  # Layered last (after app-config.yaml + app-config.production.yaml), so these
  # values win. Backstage deep-merges configs; later files override earlier.
  app-config.extra.yaml: |
    app:
      # Backstage is served at the ROOT of the shared platform host. Backstage
      # does not support a sub-path, so it owns "/" while Keycloak sits under
      # /keycloak. With a root baseUrl the frontend's static assets are baked
      # to /static and the backend serves them and its /api there natively, so
      # no path rewriting is needed (the AWS Load Balancer Controller cannot
      # rewrite paths anyway).
      baseUrl: https://patelax.people.aws.dev
    backend:
      baseUrl: https://patelax.people.aws.dev
      # Browser origin allowed to call the backend (same host).
      cors:
        origin: https://patelax.people.aws.dev
    auth:
      # Guest sign-in for now. Keycloak OIDC on the new frontend system is a
      # later step (it needs a sign-in resolver + SignInPage in the app).
      providers:
        guest: {}
    devOpsAgent:
      # AWS DevOps Agent plugin in mock mode (no Agent Space provisioned yet).
      mock: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      # No Kubernetes API access needed yet. The Kubernetes/ArgoCD plugins show
      # live cluster data only once configured (a later step); for now the portal
      # runs with catalog, scaffolder, TechDocs, search, and the DevOps Agent tab
      # (mock). Not mounting the SA token keeps things minimal.
      automountServiceAccountToken: false
      # Wait for Postgres to accept connections so a fresh deploy doesn't
      # crash-loop while the database comes up.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres.backstage.svc:5432..."
              until nc -z postgres.backstage.svc 5432; do sleep 3; done
              echo "Postgres is reachable."
      containers:
        - name: backstage
          image: backstage-image
          # Append our override config to the image's default config chain.
          command: ["node", "packages/backend"]
          args:
            - "--config"
            - "app-config.yaml"
            - "--config"
            - "app-config.production.yaml"
            - "--config"
            - "/config/app-config.extra.yaml"
          env:
            # Database (the baked production config reads these). Host is the
            # in-namespace Postgres Service; the password comes from the
            # CSI-synced Secret (from AWS Secrets Manager).
            - name: POSTGRES_HOST
              value: postgres.backstage.svc
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: backstage
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-postgres
                  key: POSTGRES_PASSWORD
            - name: NODE_ENV
              value: production
          ports:
            - name: http
              containerPort: 7007
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true
          # The backend serves the app at "/" on 7007. A TCP probe avoids
          # depending on a specific health path while it warms up.
          readinessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: app-config
          configMap:
            name: backstage-app-config
---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
spec:
  selector:
    app: backstage
  ports:
    - name: http
      port: 80
      targetPort: 7007
