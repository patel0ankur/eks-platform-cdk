# Service accounts for the Backstage workloads.
#
# Neither workload needs AWS credentials: the Postgres password and the
# Backstage session secret come from the "backstage-runtime" Kubernetes
# Secret created by Terraform (backstage-deploy.tf), not from AWS Secrets
# Manager. Backstage also does not talk to the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: backstage
